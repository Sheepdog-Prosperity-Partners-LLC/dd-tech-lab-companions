name: DD Tech Lab duality check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  duality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check script and notebook pairs
        run: python tools/check_duality.py
